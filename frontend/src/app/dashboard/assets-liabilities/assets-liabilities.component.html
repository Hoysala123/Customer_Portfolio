<div class="w-full">

  <!-- PAGE TITLE -->
  <h1 class="text-2xl font-semibold mb-8 text-gray-800">Assets & Liabilities</h1>

  <!-- PREMIUM TABS -->
  <div class="flex gap-4 mb-8">

    <!-- BONDS TAB -->
    <button
      (click)="tab='bonds'"
      class="px-6 py-2 rounded-full text-sm font-medium transition shadow-md"
      [ngClass]="tab==='bonds'
        ? 'bg-[#3B82F6] text-white shadow-lg'
        : 'bg-gray-200 text-gray-600 hover:bg-gray-300'">
      Bonds
    </button>

    <!-- FIXED DEPOSIT TAB -->
    <button
      (click)="tab='fd'"
      class="px-6 py-2 rounded-full text-sm font-medium transition shadow-md"
      [ngClass]="tab==='fd'
        ? 'bg-[#3B82F6] text-white shadow-lg'
        : 'bg-gray-200 text-gray-600 hover:bg-gray-300'">
      Fixed Deposit
    </button>

    <!-- LOANS TAB -->
    <button
      (click)="tab='loans'"
      class="px-6 py-2 rounded-full text-sm font-medium transition shadow-md"
      [ngClass]="tab==='loans'
        ? 'bg-[#3B82F6] text-gray-900 shadow-lg'
        : 'bg-gray-200 text-gray-600 hover:bg-gray-300'">
      Loans
    </button>

  </div>

  <!-- FORM CARD COMMON WRAPPER -->
  <div class="bg-white rounded-2xl shadow-xl w-[520px] p-8">

    <!-- ====================== BONDS FORM ====================== -->
    <div *ngIf="tab === 'bonds'">

      <div class="flex items-center gap-3 mb-6">
        <!-- <div class="w-10 h-10 bg-[#3B82F6]/20 flex items-center justify-center rounded-xl">
          assets/icons/bonds.png
        </div> -->
        <h2 class="text-xl font-semibold text-gray-800">Add Bonds</h2>
      </div>

      <div class="space-y-4">

        <!-- Bond Name -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Bond Name</label>
          <input [(ngModel)]="bondsForm.name"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Purchase Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Purchase Date</label>
          <input type="date"
                 [(ngModel)]="bondsForm.purchaseDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Due Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Maturity Date</label>
          <input type="date"
                 [(ngModel)]="bondsForm.dueDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Interest -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Interest (%)</label>
          <input [(ngModel)]="bondsForm.interest"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Amount -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Amount</label>
          <input [(ngModel)]="bondsForm.amount"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

      </div>

      <button
        (click)="saveBonds()"
        class="w-full mt-6 bg-gradient-to-r from-indigo-500 to-blue-600 text-white py-3 rounded-xl shadow-md hover:opacity-90">
        Submit
      </button>
    </div>

    <!-- ====================== FIXED DEPOSIT FORM ====================== -->
    <div *ngIf="tab === 'fd'">

      <div class="flex items-center gap-3 mb-6">
        <!-- <div class="w-10 h-10 bg-[#EC4899]/20 flex items-center justify-center rounded-xl">
          assets/icons/fd.png
        </div> -->
        <h2 class="text-xl font-semibold text-gray-800">Add Fixed Deposit</h2>
      </div>

      <div class="space-y-4">

        <!-- FD Name -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">FD Name</label>
          <input [(ngModel)]="fdForm.name"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Purchase Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Purchase Date</label>
          <input type="date"
                 [(ngModel)]="fdForm.purchaseDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Due Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Maturity Date</label>
          <input type="date"
                 [(ngModel)]="fdForm.dueDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Interest -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Interest (%)</label>
          <input [(ngModel)]="fdForm.interest"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Amount -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Amount</label>
          <input [(ngModel)]="fdForm.amount"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

      </div>


      <button
        (click)="saveFD()"
        class="w-full mt-6 bg-gradient-to-r from-indigo-500 to-blue-600 text-white py-3 rounded-xl shadow-md hover:opacity-90">
        Submit
      </button>
    </div>

    <!-- ====================== LOANS FORM ====================== -->
    <div *ngIf="tab === 'loans'">

      <div class="flex items-center gap-3 mb-6">
        <!-- <div class="w-10 h-10 bg-[#FACC15]/40 flex items-center justify-center rounded-xl">
          assets/icons/loans.png
        </div> -->
        <h2 class="text-xl font-semibold text-gray-800">Add Loan</h2>
      </div>

      <div class="space-y-4">

        <!-- Loan Type -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Loan Type</label>
          <input [(ngModel)]="loanForm.name"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Issued Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Issued Date</label>
          <input type="date"
                 [(ngModel)]="loanForm.issuedDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Due Date with Date Picker -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Due Date</label>
          <input type="date"
                 [(ngModel)]="loanForm.dueDate"
                 class="w-full px-4 py-2 opacity-60 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Interest -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Interest (%)</label>
          <input [(ngModel)]="loanForm.interest"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Amount -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Amount</label>
          <input [(ngModel)]="loanForm.amount"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
      </div>

      <button
        (click)="saveLoan()"
        class="w-full mt-6 bg-gradient-to-r from-indigo-500 to-blue-600 text-white py-3 rounded-xl shadow-md hover:opacity-90">
        Submit
      </button>

    </div>

  </div>

</div>
