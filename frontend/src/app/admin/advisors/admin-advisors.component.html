<app-admin-layout>

  <!-- HEADER -->
  <div class="flex justify-between items-center px-8 py-6">
    <h1 class="text-xl font-semibold">Advisor Details</h1>
    <button
      (click)="openAddForm()"
      class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
      + Add Advisor
    </button>
  </div>

  <!-- CARD -->
  <div class="bg-white rounded-xl shadow-sm mx-8 p-6 mb-10">

    <!-- TITLE -->
    <h2 class="font-medium text-lg mb-4">Advisor Table</h2>

    <!-- TABLE -->
    <div class="overflow-x-auto">
      <table class="w-full text-sm">

        <thead class="text-gray-500 border-b bg-gray-50">
          <tr>
            <th class="text-left py-3 px-4">Name</th>
            <th class="px-4">Email</th>
            <th class="px-4">Contact</th>
            <th class="px-4">Status</th>
            <th class="px-4">Customers</th>
          </tr>
        </thead>

        <tbody>

          <tr
            *ngFor="let advisor of advisors"
            class="border-b hover:bg-gray-50 transition"
          >
            <td class="py-3 px-4 font-medium">{{ advisor.name }}</td>
            <td class="px-4">{{ advisor.email }}</td>
            <td class="px-4">{{ advisor.contact }}</td>

            <td class="px-4">
              <span
                class="px-3 py-1 rounded-full text-xs font-medium"
                [class.bg-green-100]="advisor.status === 'Active'"
                [class.text-green-700]="advisor.status === 'Active'"
                [class.bg-red-100]="advisor.status === 'Inactive'"
                [class.text-red-600]="advisor.status === 'Inactive'">
                {{ advisor.status }}
              </span>
            </td>

            <td class="px-4 text-center">{{ advisor.allocatedCustomerCount }}</td>
          </tr>

          <!-- EMPTY STATE -->
          <tr *ngIf="!advisors || advisors.length === 0">
            <td colspan="6" class="text-center text-gray-400 py-10">
              No advisors available
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>

  <!-- ADD ADVISOR MODAL -->
  <div *ngIf="showAddForm" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl shadow-xl p-8 w-full max-w-md">
      
      <!-- MODAL HEADER -->
      <h2 class="text-2xl font-semibold mb-6 text-gray-800">Add New Advisor</h2>

      <!-- FORM -->
      <div class="space-y-4">

        <!-- Name Field -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Name</label>
          <input
            [(ngModel)]="newAdvisor.name"
            placeholder="Enter advisor name"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Email Field -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Email</label>
          <input
            [(ngModel)]="newAdvisor.email"
            type="email"
            placeholder="Enter email address"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Phone Field -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Phone No</label>
          <input
            [(ngModel)]="newAdvisor.phone"
            placeholder="Enter phone number"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

        <!-- Password Field -->
        <div>
          <label class="text-sm font-medium text-gray-700 block mb-2">Password</label>
          <input
            [(ngModel)]="newAdvisor.password"
            type="password"
            placeholder="Enter password"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>

      </div>

      <!-- BUTTONS -->
      <div class="flex gap-4 mt-6">
        <button
          (click)="closeAddForm()"
          class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
          Cancel
        </button>
        <button
          (click)="addAdvisor()"
          [disabled]="isLoading"
          class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition disabled:opacity-50">
          {{ isLoading ? 'Adding...' : 'Add Advisor' }}
        </button>
      </div>

    </div>
  </div>

</app-admin-layout>
