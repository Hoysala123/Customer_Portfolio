<app-admin-layout>

  <!-- HEADER -->
  <div class="flex justify-between items-center px-8 py-6">
    <h1 class="text-xl font-semibold">Advisor Details</h1>
  </div>

  <!-- CARD -->
  <div class="bg-white rounded-xl shadow-sm mx-8 p-6 mb-10">

    <!-- TITLE -->
    <h2 class="font-medium text-lg mb-4">Advisor Table</h2>

    <!-- TABLE -->
    <div class="overflow-x-auto">
      <table class="w-full text-sm">

        <thead class="text-gray-500 border-b bg-gray-50">
          <tr>
            <th class="text-left py-3 px-4">Name</th>
            <th class="px-4">Email</th>
            <th class="px-4">Contact</th>
            <th class="px-4">Status</th>
            <th class="px-4">Customers</th>
          </tr>
        </thead>

        <tbody>

          <tr
            *ngFor="let advisor of advisors"
            class="border-b hover:bg-gray-50 transition"
          >
            <td class="py-3 px-4 font-medium">{{ advisor.name }}</td>
            <td class="px-4">{{ advisor.email }}</td>
            <td class="px-4">{{ advisor.contact }}</td>

            <td class="px-4">
              <span
                class="px-3 py-1 rounded-full text-xs font-medium"
                [class.bg-green-100]="advisor.status === 'Active'"
                [class.text-green-700]="advisor.status === 'Active'"
                [class.bg-red-100]="advisor.status === 'Inactive'"
                [class.text-red-600]="advisor.status === 'Inactive'">
                {{ advisor.status }}
              </span>
            </td>

            <td class="px-4 text-center">{{ advisor.allocatedCustomerCount }}</td>
          </tr>

          <!-- EMPTY STATE -->
          <tr *ngIf="!advisors || advisors.length === 0">
            <td colspan="6" class="text-center text-gray-400 py-10">
              No advisors available
            </td>
          </tr>

        </tbody>
      </table>
    </div>

  </div>

</app-admin-layout>
