<div class="min-h-screen bg-gray-100 flex justify-center items-center p-6">

  <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">

    <h2 class="text-2xl font-semibold text-center mb-6">KYC Verification</h2>

    <!-- KYC FORM -->
    <div *ngIf="!kycSubmitted">

      <label class="text-sm font-medium">Full Name</label>
      <input
        type="text"
        [(ngModel)]="kycData.name"
        placeholder="Enter full name"
        class="w-full border rounded-md px-4 py-2 mt-1 mb-4"
      />

      <label class="text-sm font-medium">Phone Number</label>
      <input
        type="text"
        [(ngModel)]="kycData.phone"
        placeholder="Enter phone number"
        class="w-full border rounded-md px-4 py-2 mt-1 mb-4"
      />

      <label class="text-sm font-medium">Email</label>
      <input
        type="email"
        [(ngModel)]="kycData.email"
        placeholder="you@example.com"
        class="w-full border rounded-md px-4 py-2 mt-1 mb-6"
      />

      <button
        class="w-full h-[42px] rounded-md bg-blue-600 text-white"
        (click)="submitKyc()"
        [disabled]="loading"
      >
        <span *ngIf="!loading">Submit KYC</span>
        <span *ngIf="loading">Submitting...</span>
      </button>

    </div>

    <!-- OTP SECTION -->
    <div *ngIf="kycSubmitted" class="mt-6">

      <h3 class="text-lg font-medium mb-3">Enter OTP</h3>

      <input
        type="text"
        [(ngModel)]="otp"
        placeholder="Enter OTP"
        class="w-full border rounded-md px-4 py-2 mt-1 mb-4"
      />

      <button
        class="w-full bg-green-600 text-white h-[42px] rounded-md"
        (click)="verifyOtp()"
      >
        Verify OTP
      </button>

    </div>

  </div>
</div>
